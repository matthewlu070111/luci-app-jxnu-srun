name: Build luci-app-jxnu-srun

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3 python3-setuptools python3-pip python3-pyelftools \
            rsync swig unzip zlib1g-dev file wget curl

      - name: Clone OpenWrt source
        run: |
          git clone --depth=1 -b openwrt-23.05 https://github.com/openwrt/openwrt.git
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Inject package
        run: |
          mkdir -p openwrt/package/luci-app-jxnu-srun
          rsync -a --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "__pycache__" \
            --exclude "openwrt" \
            --exclude "artifacts" \
            ./ openwrt/package/luci-app-jxnu-srun/

      - name: Cache OpenWrt build
        uses: actions/cache@v4
        with:
          path: |
            openwrt/staging_dir
            openwrt/build_dir
            openwrt/toolchain
          key: ${{ runner.os }}-openwrt-rockchip-armv8-v1

      - name: Configure
        working-directory: openwrt
        run: |
          echo "CONFIG_TARGET_rockchip=y" > .config
          echo "CONFIG_TARGET_rockchip_armv8=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-jxnu-srun=y" >> .config
          make defconfig

      - name: Prepare toolchain
        working-directory: openwrt
        run: |
          make tools/install -j$(nproc)
          make toolchain/install -j$(nproc)

      - name: Compile package
        working-directory: openwrt
        run: |
          make package/luci-app-jxnu-srun/compile V=s -j"$(nproc)"

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find openwrt/bin/packages -type f -name "luci-app-jxnu-srun*.ipk" -exec cp -v {} artifacts/ \;
          if [ -z "$(ls -A artifacts)" ]; then
            echo "Failed."
            exit 1
          fi

      - name: Upload ipk
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-jxnu-srun-ipk
          path: artifacts/*.ipk
